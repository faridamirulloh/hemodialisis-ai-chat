services:
  app-hemodialysis:
    container_name: app-hemodialysis
    image: hemodialisis-app:latest
    ports:
      - '9999:3000'
    environment:
      - DATABASE_URL=postgresql://user:password@db-hemodialysis:5432/hemodialisis?schema=public
      - NODE_ENV=production
    depends_on:
      db-hemodialysis:
        condition: service_healthy

  db-hemodialysis:
    container_name: db-hemodialysis
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=hemodialisis
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d hemodialisis']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
